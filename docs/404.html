      <h1>Sam Ramseyer</h1>
      <p><strong>Full Stack Developer building scalable web applications, developer tools, and AI-powered products.</strong></p>
      <p>I've spent most of my life working with my hands — installing custom cabinets, hanging precise trim, running heavy equipment, and convoys. Today I bring that same care for craft, structure, and detail to full stack web development.</p>
      <h2>About</h2>
      <p>I joined the U.S. Army in 2006 and was dual MOS-qualified as a 21E Heavy Equipment Operator and an 88M Motor Transport Operator — moving earth, running machinery, and keeping missions rolling on the road.</p>
      <p>Outside of the military, I've spent most of my life as a carpenter in custom cabinetry and trim carpentry — installing cabinets and trim, not building them from scratch. That work taught me patience, precision, and pride in the finish — whether the job is a kitchen run or a production web app.</p>
      <p>I hold a bachelor's degree in public relations and marketing, which shaped how I think about messaging, audience, and presenting work clearly. In 2025, I earned my Full Stack Software Engineering certificate from the University of Tennessee — bringing formal training in modern web development together with everything I learned on the job site and in the field.</p>
      <p>Today I'm focused on building scalable web applications, developer tools, and AI-powered products — writing clean code, crafting responsive interfaces, and shipping work that holds up over time.</p>
      <h2>Highlights</h2>
      <ul><li>Full Stack Developer building scalable web applications, developer tools, and AI-powered products.</li>
        <li>U.S. Army veteran (since 2006) — dual MOS 21E &amp; 88M</li>
        <li>Custom cabinetry and trim carpentry — cabinet and trim installation</li>
        <li>Full Stack Software Engineering certificate — University of Tennessee (2025)</li>
        <li>Bachelor's in Public Relations &amp; Marketing</li></ul>
      <h2>Projects</h2>
      <ul><li><strong>Lakeside Cabins</strong> — Responsive cabin rental site with a photo gallery, booking flow, and availability calendar — built with HTML, CSS, and JavaScript, deployed on GitHub Pages.</li>
        <li><strong>Todo List App</strong> — React single-page app with full todo CRUD, status filters, keyboard accessibility, and a validated contact form — routing, state, and UX patterns in one project.</li>
        <li><strong>TechHelp Hub</strong> — Full-stack MERN Q&amp;A forum with JWT auth, category browsing, upvotes, accepted answers, and reputation — a capstone-style community help platform.</li>
        <li><strong>Giphy Shed</strong> — GIF search app powered by the Giphy REST API — fetch and display results in a responsive layout with clean CSS and live API integration.</li></ul>
      <h2>Contact</h2>
      <p>Email: <a href="mailto:sam.ramseyer.88@gmail.com">sam.ramseyer.88@gmail.com</a></p>
      <p>GitHub: <a href="https://github.com/samramseyer">https://github.com/samramseyer</a></p>
