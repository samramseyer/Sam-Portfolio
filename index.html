<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sam Ramseyer | Portfolio</title>
    <script>
      (function () {
        var host = location.hostname;
        var path = location.pathname;

        if (host === "localhost" || host === "127.0.0.1") {
          return;
        }

        if (path.indexOf("/docs") !== -1) return;

        var target = null;
        if (host === "samramseyer.com" || host === "www.samramseyer.com") {
          target = "/docs/" + location.search + location.hash;
        } else if (host.indexOf("github.io") !== -1) {
          if (path === "/" || path === "") {
            target = "/Sam-Portfolio/docs/" + location.search + location.hash;
          } else if (
            path.indexOf("/Sam-Portfolio") !== -1 &&
            path.indexOf("/docs") === -1
          ) {
            target = "/Sam-Portfolio/docs/" + location.search + location.hash;
          }
        }

        if (target) {
          document.write(
            '<meta http-equiv="refresh" content="0;url=' + target + '">',
          );
          location.replace(target);
        }
      })();
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0f14;
        color: #94a3b8;
        font-family: system-ui, sans-serif;
      }

      a {
        color: #5eead4;
      }
    </style>
  </head>
  <body>
    <p>Loading portfolio… <a href="/docs/">Continue</a></p>
  </body>
</html>
