name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      # GitHub Pages uses 404.html for SPA-style fallback on project sites.
      - run: cp dist/index.html dist/404.html

      - name: Verify production build
        run: |
          grep -q './assets/' dist/index.html
          grep -qE 'index-.*\.js' dist/index.html
          if grep -q '/src/main.tsx' dist/index.html; then
            echo "Build failed: dist still references source files"
            exit 1
          fi

      - name: Publish built site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
