name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/configure-pages@v5

      - run: npm ci
      - run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: cp dist/index.html dist/404.html

      - name: Publish portfolio build to docs/
        run: |
          mkdir -p docs
          rsync -a --delete dist/ docs/

      - name: Build and embed Todo List App demo
        run: |
          git clone --depth 1 https://github.com/samramseyer/Todo-App.git /tmp/todo-app
          cd /tmp/todo-app
          npm ci
          PUBLIC_URL=/docs/Todo-App npm run build
          cp build/index.html build/404.html
          mkdir -p "$GITHUB_WORKSPACE/docs/Todo-App"
          rsync -a --delete build/ "$GITHUB_WORKSPACE/docs/Todo-App/"

      - name: Build and embed RooVille demo
        run: |
          git clone --depth 1 https://github.com/samramseyer/RooVille.git /tmp/rooville
          cd /tmp/rooville
          npm ci
          VITE_BASE=/docs/RooVille/ npm run build:web
          cp dist/app.html dist/index.html
          cp dist/app.html dist/404.html
          mkdir -p "$GITHUB_WORKSPACE/docs/RooVille"
          rsync -a --delete dist/ "$GITHUB_WORKSPACE/docs/RooVille/"

      - name: Verify production build
        run: |
          grep -q 'og:title' dist/index.html
          grep -q 'og:image' dist/index.html
          grep -q 'application/ld+json' dist/index.html
          test -f dist/.nojekyll
          test -f dist/og-image.png
          test -f dist/robots.txt
          test -f dist/sitemap.xml
          if grep -q '/src/main.tsx' dist/index.html; then
            echo "Build failed: dist still references source files"
            exit 1
          fi

      - name: Commit and push docs site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet && echo "No docs changes to deploy" && exit 0
          git commit -m "deploy: update built site in docs/ [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
