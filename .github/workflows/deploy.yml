name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: cp dist/index.html dist/404.html

      - name: Verify production build
        run: |
          grep -q './assets/' dist/index.html
          grep -qE 'index-.*\.js' dist/index.html
          if grep -q '/src/main.tsx' dist/index.html; then
            echo "Build failed: dist still references source files"
            exit 1
          fi

      - name: Publish build to docs/ on main
        run: |
          mkdir -p docs
          rsync -a --delete dist/ docs/

      - name: Commit and push docs site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet && echo "No docs changes to deploy" && exit 0
          git commit -m "deploy: update built site in docs/ [skip ci]"
          git push

      - name: Publish build to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
